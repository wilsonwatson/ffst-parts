<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parts Tracker</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.19/auth0-spa-js.production.js"></script>
</head>
<body>

  <div id="login-page">
    <div class="login-box">
      <h1>Parts Tracker</h1>
      <button id="login-btn">Sign in</button>
    </div>
  </div>

  <div id="main" class="hidden">

    <header class="topbar">
      <span class="brand">Parts Tracker</span>
      <nav class="scope-filter">
        <button class="filter-btn active" data-scope="mine">My Issues</button>
        <button class="filter-btn" data-scope="all">All</button>
        <button class="filter-btn" data-scope="assignees">By Assignee</button>
      </nav>
      <div class="topbar-divider"></div>
      <nav class="type-filter" id="type-filter">
        <button class="filter-btn active" data-type="">All</button>
        <button class="filter-btn" data-type="3d_print">3D Print</button>
        <button class="filter-btn" data-type="cnc">CNC</button>
        <button class="filter-btn" data-type="manual_cut">Manual Cut</button>
      </nav>
      <div class="topbar-right">
        <button id="refresh-btn" class="icon-btn" title="Refresh">↺</button>
        <div id="user-menu-wrap">
          <button id="user-menu-btn" class="user-menu-btn">
            <img id="user-avatar" class="avatar" src="" alt="">
            <span id="user-name"></span>
          </button>
          <div id="user-dropdown" class="user-dropdown hidden">
            <button id="logout-btn">Sign out</button>
          </div>
        </div>
      </div>
    </header>

    <div id="board-wrap">
      <div id="board"></div>
    </div>

  </div>

  <!-- Issue detail panel -->
  <div id="overlay" class="hidden"></div>
  <aside id="panel" class="hidden">
    <div class="panel-toolbar">
      <button id="panel-close" class="icon-btn">✕</button>
    </div>
    <div id="panel-body"></div>
  </aside>

  <footer id="app-footer">
    <a href="tutorial.html">How to Use ↗</a>
    <span style="margin:0 8px;opacity:.3">|</span>
    <a href="https://cad.onshape.com/appstore/apps/Manufacturing/69fa1d06c40dd85548c8cc75" target="_blank" rel="noopener">
      OnShape Side Panel ↗
    </a>
  </footer>

  <script src="index.js"></script>
</body>
</html>
