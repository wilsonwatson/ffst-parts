<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Part</title>
  <link rel="stylesheet" href="onshape.css">
</head>
<body>

  <div id="login-page">
    <div class="brand">Parts Tracker</div>
    <p>Sign in to submit parts for manufacturing.</p>
    <button id="login-btn">Sign in with Google</button>
  </div>

  <div id="main" class="hidden">
    <header>
      <img id="user-avatar" class="avatar" src="" alt="" />
      <span id="user-name"></span>
    </header>

    <section id="selection-state">
      <div id="state-none" class="state-panel">
        <p>Select a part from the assembly.</p>
      </div>
      <div id="state-loading" class="state-panel hidden">
        <p>Resolving part&hellip;</p>
      </div>
      <div id="state-one" class="state-panel hidden">
        <div id="part-name" class="part-name"></div>
        <a id="part-link" class="part-link" href="#" target="_blank">Open in OnShape ↗</a>
      </div>
      <div id="state-multi" class="state-panel hidden">
        <p>Select only one part at a time.</p>
      </div>
      <div id="state-error" class="state-panel hidden">
        <p>Could not resolve part - try reselecting.</p>
      </div>
    </section>

    <section id="form-area">
      <div class="field">
        <label for="submission-name">Name</label>
        <input type="text" id="submission-name" placeholder="Part name for submission…" />
      </div>

      <div class="field">
        <label>Type</label>
        <ul class="selector" id="mfg-type">
          <li data-value="3d_print">3D Print</li>
          <li data-value="cnc">CNC</li>
          <li data-value="manual_cut">Manual Cut</li>
        </ul>
      </div>

      <div class="field row">
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" min="1" value="1" />
      </div>

      <div class="field">
        <label for="material">Material</label>
        <input type="text" id="material" placeholder="Loading from OnShape…" />
      </div>

      <div class="field row">
        <label for="due-date">Due Date</label>
        <input type="date" id="due-date" />
      </div>

      <div class="field">
        <label for="notes">Notes</label>
        <textarea id="notes" rows="3" placeholder="Tolerances, special instructions…"></textarea>
      </div>

      <div class="field" id="redesign-field">
        <label for="redesign-pred">Replaces (redesign)</label>
        <select id="redesign-pred">
          <option value="">- None -</option>
        </select>
      </div>

      <div id="submit-error" class="error hidden"></div>
      <button id="submit-btn" disabled>Submit Part</button>
    </section>
  </div>

  <script src="onshape.js"></script>
</body>
</html>
